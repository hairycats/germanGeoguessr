<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; }
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMcSfVtvncFcce0F8HKoE7KYRxop-CwLVO_L0Y2ri_BqX8VlcahrnU-cojUytxqAlI/exec";

    // Read ?player=1 or ?player=2 from the URL
    const player = new URLSearchParams(window.location.search).get("player") || "unknown";

    let currentMarker = null;
    let currentRow = null;       // sheet row of the current point
    let lastLatLng = null;       // LatLng of the current point

    // Returns distance in metres between two google.maps.LatLng objects
    function distanceMeters(a, b) {
      return google.maps.geometry.spherical.computeDistanceBetween(a, b);
    }

    function initMap() {
      const map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 51.1657, lng: 10.4515 },
        zoom: 6
      });

      map.addListener("click", async (e) => {
        const clickedLatLng = e.latLng;
        const lat = clickedLatLng.lat();
        const lng = clickedLatLng.lng();

        // --- Double-click on same spot: delete point ---
        if (lastLatLng && distanceMeters(clickedLatLng, lastLatLng) < 1000000) {
          if (currentMarker) {
            currentMarker.setMap(null);
            currentMarker = null;
          }
          if (currentRow) {
            try {
              await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "delete", row: currentRow })
              });
            } catch (err) {
              console.error("Error deleting point:", err);
            }
            currentRow = null;
          }
          lastLatLng = null;
          return;
        }

        // --- New click: replace marker and update sheet ---
        // Delete previous sheet row if one exists
        if (currentRow) {
          try {
            await fetch(APPS_SCRIPT_URL, {
              method: "POST",
              headers: { "Content-Type": "text/plain" },
              body: JSON.stringify({ action: "delete", row: currentRow })
            });
          } catch (err) {
            console.error("Error removing old point:", err);
          }
          currentRow = null;
        }

        // Remove previous marker
        if (currentMarker) {
          currentMarker.setMap(null);
        }

        // Place new marker
        currentMarker = new google.maps.Marker({
          position: { lat, lng },
          map
        });
        lastLatLng = clickedLatLng;

        // Save to sheet and store the returned row number
        try {
          const res = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ player, lat, lng })
          });
          const json = await res.json();
          if (json.row) currentRow = json.row;
        } catch (err) {
          console.error("Error saving point:", err);
        }
      });
    }
  </script>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC-FmQnZPEPG4jRGHYVv1saE73Q0U4yDjA&libraries=geometry&callback=initMap" async defer></script>
</body>
</html>
