<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; }
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMcSfVtvncFcce0F8HKoE7KYRxop-CwLVO_L0Y2ri_BqX8VlcahrnU-cojUytxqAlI/exec";

    const params = new URLSearchParams(window.location.search);
    const player = params.get("player") || "unknown";
    const city   = params.get("city")   || "unknown";

    const CITIES = {
      berlin:    { lat: 52.5200, lng: 13.4050, zoom: 11 },
      munich:    { lat: 48.1351, lng: 11.5820, zoom: 11 },
      hamburg:   { lat: 53.5753, lng: 10.0153, zoom: 11 },
      cologne:   { lat: 50.9333, lng: 6.9500,  zoom: 11 },
      frankfurt: { lat: 50.1109, lng: 8.6821,  zoom: 11 },
      stuttgart: { lat: 48.7758, lng: 9.1829,  zoom: 11 },
      dresden:   { lat: 51.0504, lng: 13.7373, zoom: 11 },
      leipzig:   { lat: 51.3397, lng: 12.3731, zoom: 11 },
      nuremberg: { lat: 49.4521, lng: 11.0767, zoom: 11 },
      dusseldorf:{ lat: 51.2217, lng: 6.7762,  zoom: 11 },
    };

    const cityConfig = CITIES[city.toLowerCase()] || { lat: 51.1657, lng: 10.4515, zoom: 6 };

    let currentMarker = null;
    let currentRow    = null;
    let lastClickTime = 0;          // timestamp of previous click
    const DOUBLE_CLICK_MS = 400;    // clicks within this window = double-click

    function initMap() {
      const map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 51.1657, lng: 10.4515 },
        zoom: 6
      });

      map.addListener("click", async (e) => {
        const now = Date.now();
        const isDoubleClick = (now - lastClickTime) < DOUBLE_CLICK_MS;
        lastClickTime = now;

        // --- Double-click: delete current point and clear ---
        if (isDoubleClick) {
          if (currentMarker) {
            currentMarker.setMap(null);
            currentMarker = null;
          }
          if (currentRow) {
            try {
              await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "delete", row: currentRow })
              });
            } catch (err) {
              console.error("Error deleting point:", err);
            }
            currentRow = null;
          }
          return;
        }

        // --- Single click: replace existing point with new one ---

        // Delete previous sheet row first
        if (currentRow) {
          try {
            await fetch(APPS_SCRIPT_URL, {
              method: "POST",
              headers: { "Content-Type": "text/plain" },
              body: JSON.stringify({ action: "delete", row: currentRow })
            });
          } catch (err) {
            console.error("Error removing old point:", err);
          }
          currentRow = null;
        }

        // Remove previous marker
        if (currentMarker) {
          currentMarker.setMap(null);
          currentMarker = null;
        }

        // Place new marker
        const lat = e.latLng.lat();
        const lng = e.latLng.lng();

        currentMarker = new google.maps.Marker({
          position: { lat, lng },
          map
        });

        // Save to sheet
        try {
          const res = await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ player, city, lat, lng })
          });
          const json = await res.json();
          if (json.row) currentRow = json.row;
        } catch (err) {
          console.error("Error saving point:", err);
        }
      });
    }
  </script>

  <script src="https://script.google.com/macros/s/AKfycbzP-ZzfNVJqj75-tUc4kLVdhrXGuiqI0kseEzeB2M06Q3e4A7A79sgQF3Xxr12rtdr6/exec" async defer></script>
</body>
</html>
